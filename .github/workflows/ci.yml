name: CI
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Regenerate node_modules from package.json so platform-specific
      # optional deps (lightningcss native bin) resolve for the runner OS.
      # The committed lockfile is Windows-generated and lacks the Linux entries.
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run build
